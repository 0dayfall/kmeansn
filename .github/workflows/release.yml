name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.tag != '' && inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x86_64
          - target: aarch64-unknown-linux-gnu
            arch: arm64
    steps:
      - name: Ensure tag
        shell: bash
        run: |
          if [[ "${TAG}" != v* ]]; then
            echo "TAG must start with v (got ${TAG})"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross linker (arm64)
        if: ${{ matrix.target == 'aarch64-unknown-linux-gnu' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          TAG="${TAG}"
          VERSION="${TAG#v}"
          mkdir -p dist
          tar -C "target/${{ matrix.target }}/release" -czf "dist/kmeansn_${VERSION}_Linux_${{ matrix.arch }}.tar.gz" kmeansn

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: dist/kmeansn_*_Linux_*.tar.gz
